name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore --nologo

      - name: Build
        run: dotnet build -c Release --no-restore --nologo

      - name: Publish (single-file, self-contained)
        run: >
          dotnet publish -c Release -r win-x64 --no-restore --nologo
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VpnLinkExtractor-win-x64
          path: publish/VpnLinkExtractor.exe
          if-no-files-found: error
